name: AgentHub Validation
run-name: AgentHub validation ${{ inputs.trace_id || github.run_id }}

on:
  workflow_dispatch:
    inputs:
      trace_id:
        description: AgentHub trace id
        required: true
        type: string
      correlation_id:
        description: AgentHub correlation id
        required: true
        type: string
      note:
        description: Validation note
        required: false
        type: string

jobs:
  echo-inputs:
    runs-on: ubuntu-latest
    steps:
      - name: Print dispatch inputs
        run: |
          echo "trace_id=${{ inputs.trace_id }}"
          echo "correlation_id=${{ inputs.correlation_id }}"
          echo "note=${{ inputs.note }}"
